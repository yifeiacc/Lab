news:
  - date: "2026"
    title: TRACE appears at WWW 2026.
    title_zh: TRACE 论文发表于 WWW 2026。
    description: Trajectory-aware evaluation for deep research agents.
    description_zh: 面向深度研究智能体的轨迹感知综合评测。
  - date: "2026"
    title: Hierarchically Robust Zero-shot Vision-Language Models appears at CVPR 2026.
    title_zh: 分层鲁棒零样本视觉语言模型论文发表于 CVPR 2026。
    description: Robust zero-shot vision-language modeling.
    description_zh: 面向鲁棒零样本视觉语言建模。
  - date: "2026"
    title: Geometric Collapse appears at ICML 2026.
    title_zh: Geometric Collapse 论文发表于 ICML 2026。
    description: Studying when vision models fail to verify physical causality.
    description_zh: 研究视觉模型何时无法验证物理因果关系。
  - date: "2025"
    title: CrossSpectra appears at NeurIPS 2025.
    title_zh: CrossSpectra 论文发表于 NeurIPS 2025。
    description: Cross-layer smoothness for parameter-efficient fine-tuning.
    description_zh: 利用跨层平滑性进行参数高效微调。

gallery:
