name: DISC Lab
tagline: Where data becomes insight, and intelligence drives scientific discovery
description: >
  The **Data Intelligence and Scientific Discovery Lab (DISC Lab)** is advancing
  the frontier of data intelligence and scientific discovery to
  transform complex data into trustworthy insights, intelligent systems, 
  and scientific breakthroughs.

