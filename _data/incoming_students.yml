  title: 欢迎 2026 级新同学！
  text: >
    欢迎对可信机器学习、大模型、视觉语言模型、联邦学习、图学习、持续学习、
    鲁棒性、公平性与高效适配感兴趣的同学联系。

intro:
  title: 致同学们
  paragraphs:
    - >
      欢迎来到 DISC Lab（数据智能与科学发现实验室）。联系我前，请花几分钟阅读此文。
      希望这篇文档可以帮助你更好地了解本课题组，也帮助你判断是否适合加入我们。
    - >
      本页面面向有意申请研究生、提前进组、本科科研训练或未来合作的同学。
      如果你已经在学校，也欢迎直接和组里的同学交流，了解真实的组内工作和生活节奏。

sections:
  - number: 1
    title: 招生
    questions:
      - question: 我是谁？
        answer: >
          张逸飞, 西北工业大学，计算机学院教授/博导，国家级青年人才
      - question: 团队情况如何？
        answer: >
          本页面介绍我所直接指导学生的小组情况，包括当前学生、活跃合作者以及主要研究方向。
      - question: 我的研究方向是什么？
        answer: >
          可信机器学习、大模型与视觉语言模型、联邦学习、图学习、持续学习、鲁棒性、
          公平性与高效适配。
      - question: 每年招收多少研究生？
        answer: >
          招生名额以学校、学院当年政策和实际名额为准（通常为 2-3 名，考研与保研）。博士请咨询我（优秀的候选人，我会争取名额）欢迎提前邮件沟通研究兴趣与申请计划。
      - question: 招收的学科方向是什么？
        answer: >
          以学校当年招生目录为准。适合对机器学习、人工智能、数据挖掘、图学习、
          多模态学习或可信 AI 感兴趣的同学。
      - question: 如何得到我邮件的及时回复？
        answer: >
          请尽量说明姓名、年级或申请项目、研究兴趣、已有项目/论文/代码经历，
          并附上简历或个人主页链接。具体问题可以直接邮件咨询。

  - number: 2
    title: 科研
    questions:
      - question: 我的研究方向是什么？
        answer: >
          组内关注可信机器学习及其在基础模型、联邦智能、图结构数据、多模态学习中的方法与评估问题。
      - question: 要培养学生什么样的能力？
        answer: >
          独立提出问题、系统阅读论文、设计可复现实验、清晰写作表达、持续迭代研究想法，
          以及和合作者稳定沟通推进工作的能力。
      - question: 学生的科研方向
        answer: >
          入组后会结合个人兴趣、已有基础和组内项目，在可信机器学习、大模型、
          视觉语言模型、联邦学习、图学习等方向中逐步确定具体题目。
      - question: 本组鼓励什么样的研究？
        answer: >
          鼓励问题驱动、证据扎实、可复现、可解释，并与真实模型、真实数据或真实用户场景相连接的研究。
      - question: 关于人工智能、LLM 和 AIGC
        answer: >
          欢迎把 LLM 与 AIGC 作为研究对象或研究工具，但更重视严格评估、可靠性、
          安全性、公平性和行为可追溯。
      - question: 关于深度学习
        answer: >
          我们会把深度学习作为基础工具，也会关注其失效模式、鲁棒性边界和可信评估方法。

  - number: 3
    title: 研究生培养
    questions:
      - question: 导师在学生培养过程中能提供什么？
        answer: >
          选题讨论、论文反馈、实验设计建议、组会交流、合作资源，以及围绕长期科研能力的持续训练。
      - question: 你的毕业要求是什么？
        answer: >
          以学校和学院的要求为准。组内更重视完整研究训练、扎实过程记录和可交付成果。
      - question: 能不能按时毕业？
        answer: >
          以学校培养要求和个人研究进展为准。组里会尽量在选题、节奏和风险上尽早沟通。
      - question: 能不能实习？
        answer: >
          尊重同学们的意愿与想法，在保证毕业要求的前提下，就事论事，平等协商。
      - question: 发论文的要求？
        answer: 以学校的要求为准。
      - question: 毕业有什么捷径没有？
        answer: >
          没有稳定捷径。更可靠的路径是尽早明确问题、持续推进实验、及时沟通风险，
          并把论文、代码、记录和写作都做扎实。
      - question: 未来的就业方向如何？
        answer: >
          取决于个人积累、研究方向与市场情况。组内鼓励同学积累可展示的科研、
          工程与写作成果，为升学或就业保留选择空间。
      - question: 工作好不好找？
        answer: >
          这个问题没有统一答案。我们更关注让每位同学形成可迁移的研究、工程和表达能力。

  - number: 4
    title: 其他问题
    questions:
      - question: 其他……？
        answer: >
          关于各种同学们关心且本文没有回答的问题，基本原则是：在保证毕业要求和科研训练质量的前提下，
          尊重同学们的意愿与想法，就事论事，平等协商。
      - question: 还有其他可以参考的说明吗？
        answer: >
          飞书页面参考过“写给希望到本组读研、直博或进组的同学”一文。
          你也可以阅读类似材料，提前理解研究生阶段的节奏、责任和长期能力目标。

