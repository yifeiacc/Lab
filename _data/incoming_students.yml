welcome:
  icon: "❤️"
  title: 欢迎 2026 级新同学！
  text: >
    DISC Lab 今年仍有少量研究生招生名额，计划招收 <s>2</s> 1 名硕士研究生（保研），<s>1</s> 0名研究博士研究生，<s>1</s> 0名工程博士研究生（在职）。欢迎对数据智能、知识发现、机器学习、自监督学习、智能体学习、空间智能、多模态学习等方向感兴趣的同学联系交流。课题组目前处于快速建设阶段，早期加入的学生将获得较充分的导师指导、科研资源支持和团队发展机会，也将作为团队的重要成员共同参与 DISC Lab 的长期建设。


intro:
  title: 致同学们
  paragraphs:
    - >
      欢迎来到 DISC Lab（数据智能与科学发现课题组）。联系我前，请花<b>几分钟</b>阅读此文。
      希望这篇文档可以帮助你更好地了解本课题组，也帮助你判断是否适合加入我们。
    - >
      <b>数据智能与科学发现课题组</b> 隶属于工业和信息化部大数据管理与分析重点实验室，主要围绕数据智能、机器学习、知识发现和科学发现等方向开展研究。
      实验室名称 <b>DISC</b> 来源于 <b>Data Intelligence and Scientific Discovery</b>，其中 <b>DI</b> 代表 Data Intelligence，强调面向复杂数据的数据挖掘、
      表征学习、机器学习和智能分析；<b>SC</b> 代表 Scientific Discovery，强调利用数据与智能方法推动知识生成和科学创新。同时，DISC 本身蕴含 <b>discovery</b> 的含义，
      体现实验室“从数据中发现知识、以智能驱动科学”的核心目标；其发音也接近 <b>disk</b>，与数据存储、数据管理和数据计算天然相关，契合实验室以数据为基础、以智能为方法、
      以发现为目标的研究定位。实验室致力于将复杂数据转化为可信洞察、智能系统和科学突破，推动数据智能与科学发现的交叉融合发展。
    - >
      本页面面向有意申请研究生、提前进组、本科科研训练或未来合作的同学。
      如果你已经在学校，也欢迎直接和组里的同学交流，了解真实的组内工作和生活节奏。

sections:
  - number: 1
    title: 招生
    questions:
      - question: 我是谁？
        answer: >
          <b>张逸飞</b>, 西北工业大学，计算机学院教授/博导，国家级青年人才，一位刚入职不久的年轻老师。
      - question: 团队情况如何？
        answer: >
          <b>DISC Lab</b> 隶属于工业和信息化部大数据管理与分析重点实验室。课题组目前处于建设初期，
          团队规模还不大，但这也意味着未来加入的学生将拥有更充分的成长空间、更高的参与度和更直接的指导机会。
          所有早期加入的学生都将是课题组发展的 founding members（创始成员），能够深度参与实验室方向凝练、
          科研平台建设和学术文化形成。更重要的是，学生可以获得导师手把手的科研指导，以及课题组在计算资源、
          科研项目、论文合作、学术交流和职业发展等方面的全部支持，与课题组共同成长、共同建设、共同发展。
      - question: 我的研究方向是什么？
        answer: >
          我主要致力于构建面向基础模型的可靠学习系统，研究重点聚焦于以数据为中心的机器智能，涵盖自监督学习、智能体学习、空间智能、表征学习，以及从大规模多模态数据中进行知识发现
      - question: 每年招收多少研究生？
        answer: >
          招生名额以学校、学院当年政策和实际名额为准（通常为 2-3 名，考研与保研）。博士请咨询我（优秀的候选人，我会争取名额）欢迎提前邮件沟通研究兴趣与申请计划。
      - question: 招收的学科方向是什么？
        answer: >
          以学校当年招生目录为准。适合对机器学习、人工智能、数据挖掘、
          多模态学习或可信 AI 感兴趣的同学。
      - question: 我需要招什么样的学生？
        answer: >
          我并不单纯看重课业成绩，也不希望只用绩点或排名来定义一个学生的潜力。相比“成绩优秀”，我更看重的是多元化的科研能力、持续成长的意愿，以及你能为团队带来的独特贡献。你不一定需要样样突出，但需要在某一个方面有清晰的长板：**可以是问题理解能力强，可以是动手实现能力强，可以是数学和理论基础好，可以是工程系统能力突出，也可以是沟通协调、组织推进、团队协作或情绪支持能力出色**。
          当然，如果你无法清楚展现自己在某一方面的特长、潜力或对团队的贡献，那么成绩就会成为我唯一能够直接看到的衡量标准。因此，我更希望你能够主动告诉我：你擅长什么、你愿意承担什么、你能为团队带来什么，以及你希望在课题组中成长为什么样的人。
          一个好的科研团队不只需要同一种类型的人。我希望团队里既有“镇山的虎”，能够在关键问题上攻坚克难；也有“远见的鹰”，能够看清方向、提出有价值的问题；还需要“敏捷的豹”，能够快速行动、高效验证想法。团队需要**聪明能干、敢想敢做**的小师弟，也需要**八面玲珑、能够组织协作**的大师兄，还需要愿意**鼓励大家、让团队更有温度**的小师妹。无论你是哪一种类型，只要你有热情、有责任心、有一项能真正贡献团队的能力，并愿意和大家一起成长，DISC Lab 都欢迎你的加入。
      - question: 如何得到我邮件的及时回复？
        answer: >
          鉴于近年来接收到报考意愿的邮件太多，如果是明显的“复制—粘贴—群发”的邮件，请恕我不回复，还请谅解。
          例如，明显是群发的邮件，除了“尊敬的 xxx 老师”换了老师名字以外，其余内容无任何差异性的邮件；过往经历、
          内容体现不出一丝一毫和我的研究方向相关的，或者全文没有体现出一丝一毫对我的研究方向做过调研或展现出研究兴趣的。
          我不反对用LLM生成邮件，但请务必体现出你对我的研究方向有调研和兴趣。我遇到了很多用LLM直接读取我个人网站后生成的邮件，毫无自己思考和独特性，
          很多人生成的内容相似，强调的内容相似，这样的邮件我也不会回复。请务必体现出你对我的研究方向有调研和兴趣，并且邮件内容体现出你个人的独特性。

  - number: 2
    title: 科研
    questions:
      - question: 我的研究方向是什么？
        answer: >
          研究重点聚焦于以数据为中心的机器智能，涵盖自监督学习、智能体学习、空间智能、表征学习，以及从大规模多模态数据中进行知识发现
      - question: 要培养学生什么样的能力？
        answer: >
          独立提出问题、系统阅读论文、设计可复现实验、清晰写作表达、持续迭代研究想法，
          以及和合作者稳定沟通推进工作的能力。
      - question: 学生的科研方向
        answer: >
          入组后会结合个人兴趣、已有基础和组内项目，在可信机器学习、大模型、
          视觉语言模型、联邦学习、图学习等方向中逐步确定具体题目。
      - question: 本组鼓励什么样的研究？
        answer: >
          鼓励问题驱动、证据扎实、可复现、可解释，并与真实模型、真实数据或真实用户场景相连接的研究。
      - question: 关于人工智能、LLM 和 AIGC
        answer: >
          欢迎把 LLM 与 AIGC 作为研究对象或研究工具，但更重视严格评估、可靠性、
          安全性、公平性和行为可追溯。
      - question: 关于深度学习
        answer: >
          我们会把深度学习作为基础工具，也会关注其失效模式、鲁棒性边界和可信评估方法。

  - number: 3
    title: 研究生培养
    questions:
      - question: 研究生的培养原则是什么？
        answer: >
          我的研究生培养理念，很大程度上来自我的导师对我的培养和教导：your success is also my success。我始终认为，学生的成长和成功也是导师最大的成就。因此，我希望每一位加入 DISC Lab 的学生都能够在这里获得真正的成长，找到适合自己的研究方向，形成独立思考和解决问题的能力，并在未来拥有更好的发展机会。
          在培养过程中，我会尽可能为学生提供充分的支持，包括科研、学术交流、项目机会以及职业发展建议。我也会尽量让自己对学生保持 available，在学生真正需要帮助、遇到困难或面临关键选择时，能够及时给予指导和支持。我希望课题组不是一个简单完成任务的地方，而是一个导师和学生共同投入、共同成长、共同面对挑战的团队。
          与此同时，我也希望每一位学生都能保持基本的尊重、坦诚和责任感。科研合作建立在信任之上，而 trust is easy to break but takes years to fix。我会尽我所能帮助你成长，也愿意理解学生在科研过程中遇到的困难、挫折和不确定性。但请不要用**糊弄、敷衍或欺骗**的方式对待导师。一旦出现信任问题，
          它不会因为一句解释或一次道歉就立刻恢复，而往往需要数年时间重新证明、重新积累、重新修复。能力可以培养，经验可以积累，错误也可以一起修正；但**诚实、尊重和可信赖**，消耗就无法弥补。
      - question: 导师在学生培养过程中能提供什么？
        answer: >
          选题讨论、论文反馈、实验设计建议、组会交流、合作资源，以及围绕长期科研能力的持续训练。
      - question: 你的毕业要求是什么？
        answer: >
          以学校和学院的要求为准。组内更重视完整研究训练、扎实过程记录和可交付成果。
      - question: 能不能按时毕业？
        answer: >
          以学校培养要求和个人研究进展为准。组里会尽量在选题、节奏和风险上尽早沟通。
      - question: 能不能实习？
        answer: >
          尊重同学们的意愿与想法，在保证毕业要求的前提下，就事论事，平等协商。
      - question: 发论文的要求？
        answer: 以学校的要求为准。
      - question: 毕业有什么捷径没有？
        answer: >
          有。这个唯一的捷径，就是学会高效、主动地和我沟通。本组虽然设置了若干机制，保证师生沟通的顺畅，但是架不住我的事情太多，
          因此我主动去找你们，平摊到每一个人的机会和时间是比较少的。如果想要快速地推进你的学习研究工作，请主动找我，约我的时间，
          不要等着我去找你们。注意；老师不会因为你老来「信息轰炸」我而生气，但是绝对会因为你**几个月不来找我、科研学习没有进展而生气**。
      - question: 未来的就业方向如何？
        answer: >
          取决于个人积累、研究方向与市场情况。组内鼓励同学积累可展示的科研、
          工程与写作成果，为升学或就业保留选择空间。
      - question: 工作好不好找？
        answer: >
          这个问题没有统一答案。我们更关注让每位同学形成可迁移的研究、工程和表达能力。

  - number: 4
    title: 其他问题
    questions:
      - question: 会不会帮忙找工作和升学？
        answer: >
          如果能好好的在我指导下读完，我觉得不需要导师推荐，特殊情况有困难的，可以
      - question: 其他……？
        answer: >
          关于各种同学们关心且本文没有回答的问题，基本原则是：在保证毕业要求和科研训练质量的前提下，
          尊重同学们的意愿与想法，就事论事，平等协商。

